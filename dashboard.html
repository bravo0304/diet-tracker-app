<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/styles.css">


</head>

<body>
  <h2>Today</h2>

  <div class="box">
    <h3>Remaining Calories</h3>

    <img id="preview"/>
  </div>

<script src="app.js"></script>
</body>
</html>
