<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header class="navbar">
    <h1>My Diet Tracker</h1>
    <a href="settings.html" class="primary-btn">Settings</a>
  </header>

  <main class="container">

    <!-- Top Summary: Calories Ring -->
    <div id="top-summary" class="card">
      <canvas id="caloriesRing" width="150" height="150"></canvas>
      <div id="remaining" class="calories-text">0 kcal</div>
      <div id="reset-timer" class="timer-text">Time to reset: 00:00:00</div>
    </div>

    <!-- Mini Macro Pie Charts -->
    <div id="macro-charts" class="macro-grid">
     <div class="macro-card">
  <span id="proteinLabel">Protein: 0 / 140 g</span>
  <canvas id="proteinPie" width="80" height="80"></canvas>
</div>
<div class="macro-card">
  <span id="fatLabel">Fat: 0 / 55 g</span>
  <canvas id="fatPie" width="80" height="80"></canvas>
</div>
<div class="macro-card">
  <span id="carbsLabel">Carbs: 0 / 220 g</span>
  <canvas id="carbsPie" width="80" height="80"></canvas>
</div>
    </div>

    <!-- Daily Food Log -->
    <div id="daily-log" class="card">
      <h3>Daily Food Log</h3>
      <ul id="foodEntries"></ul>
      <button id="newEntryBtn" class="primary-btn">New Entry</button>
    </div>

  </main>

  <script src="app.js"></script>
  <script>
    // ---------- Calories Ring ----------
    let caloriesChart;
    function drawCaloriesRing(remaining, target) {
      const ctx = document.getElementById('caloriesRing').getContext('2d');
      if(caloriesChart) caloriesChart.destroy();
      caloriesChart = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: ['Consumed', 'Remaining'],
          datasets: [{
            data: [target - remaining, remaining],
            backgroundColor: ['#FF6B4A', '#EEEEEE'],
            borderWidth: 0
          }]
        },
        options: {
          cutout: '70%',
          plugins: { legend: { display: false } },
          responsive: false,
          maintainAspectRatio: false
        }
      });
    }

    // ---------- Macro Pie Charts ----------
    let proteinChart, fatChart, carbsChart;
    function drawMacroPie(id, value, target, color) {
      const ctx = document.getElementById(id).getContext('2d');
      const data = [value, Math.max(target - value, 0)];
      const bg = [color, '#EEEEEE'];
      const chartObj = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: ['Consumed','Remaining'],
          datasets:[{ data: data, backgroundColor: bg, borderWidth: 0 }]
        },
        options: {
          cutout: '70%',
          plugins:{legend:{display:false}},
          responsive:false,
          maintainAspectRatio:false
        }
      });
      if(id==='proteinPie'){proteinChart=chartObj;}
      if(id==='fatPie'){fatChart=chartObj;}
      if(id==='carbsPie'){carbsChart=chartObj;}
    }

    // ---------- Daily Reset Timer ----------
    function startResetTimer() {
      const timerEl = document.getElementById('reset-timer');
      function updateTimer() {
        const now = new Date();
        const nextMidnight = new Date();
        nextMidnight.setHours(24,0,0,0);
        const diff = nextMidnight - now;
        const hours = String(Math.floor(diff / 3600000)).padStart(2,'0');
        const mins = String(Math.floor((diff % 3600000)/60000)).padStart(2,'0');
        const secs = String(Math.floor((diff % 60000)/1000)).padStart(2,'0');
        timerEl.innerText = `Time to reset: ${hours}:${mins}:${secs}`;
      }
      updateTimer();
      setInterval(updateTimer, 1000);
    }

    document.addEventListener("DOMContentLoaded", () => {
      loadCalories();
      setupCamera();
      startResetTimer();
    });
  </script>
</body>
</html>
