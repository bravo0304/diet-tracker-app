<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header class="navbar">
    <h1>My Diet Tracker</h1>
    <a href="settings.html" class="primary-btn">Settings</a>
  </header>

  <main class="container">

    <!-- Top Summary: Calories Ring -->
   <div id="top-summary" class="card">
  <canvas id="caloriesRing"></canvas>

  <div class="calories-text">
    <span id="caloriesLabel">Loading...</span>
  </div>
  <div id="reset-timer" class="timer-text">Time to reset: 00:00:00</div>
</div>


    <!-- Mini Macro Pie Charts -->
    <div id="macro-charts" class="macro-grid">
     <div class="macro-card">
  <span id="proteinLabel">Loading...</span>
  <canvas id="proteinPie" width="80" height="80"></canvas>
</div>
<div class="macro-card">
  <span id="fatLabel">Loading...</span>
  <canvas id="fatPie" width="80" height="80"></canvas>
</div>
<div class="macro-card">
  <span id="carbsLabel">Loading...</span>
  <canvas id="carbsPie" width="80" height="80"></canvas>
</div>
    </div>

    <!-- Daily Food Log -->
    <div id="daily-log" class="card">
      <h3>Daily Food Log</h3>
      <ul id="foodEntries"></ul>
      <button id="newEntryBtn" class="primary-btn">New Entry</button>
    </div>

  </main>

  <script src="app.js"></script>
</body>
</html>
