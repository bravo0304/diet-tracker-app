<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <!-- TOP BAR -->
  <header class="top-bar">
  <div class="top-left">
  <img src="/assets/logo.png" class="header-logo" alt="Logo">
</div>
    <a href="settings.html" class="settings-link">Settings</a>
  </header>

  <main class="container">

  <!-- WEEK STRIP -->
 <div class="week-nav">
  <button id="prevWeekBtn" class="week-arrow">‹</button>
  <div id="weekStrip" class="week-strip"></div>
  <button id="nextWeekBtn" class="week-arrow">›</button>
</div>

  <!-- TOP SECTION (Circle + Summary Side by Side) -->
  <div class="top-section card">

  <!-- TOP ROW -->
  <div class="top-row">

    <div class="goal-main">
      <div id="goalBigNumber" class="goal-big">0</div>
      <div id="goalLabel" class="goal-label">Calories left</div>
      <div id="goalSubtext" class="goal-reset">Resets in 00:00:00</div>
    </div>

    <div class="ring-wrapper">
      <div id="caloriesRing" class="ring">
        <div class="ring-inner">
          <div id="ringNumber" class="ring-number">0 / 0</div>
          <div class="ring-label">Calories</div>
        </div>
      </div>
    </div>

  </div> <!-- END top-row -->


  <!-- MACROS BELOW (OUTSIDE top-row) -->
  <div class="macro-bars">

    <div class="macro-bar">
      <div class="macro-header">
        <span>Protein</span>
        <span id="proteinLabel">0 / 0 g</span>
      </div>
      <div class="bar-bg">
        <div class="bar-fill protein-fill" id="proteinBar"></div>
      </div>
    </div>

    <div class="macro-bar">
      <div class="macro-header">
        <span>Fat</span>
        <span id="fatLabel">0 / 0 g</span>
      </div>
      <div class="bar-bg">
        <div class="bar-fill fat-fill" id="fatBar"></div>
      </div>
    </div>

    <div class="macro-bar">
      <div class="macro-header">
        <span>Carbs</span>
        <span id="carbsLabel">0 / 0 g</span>
      </div>
      <div class="bar-bg">
        <div class="bar-fill carbs-fill" id="carbsBar"></div>
      </div>
    </div>

  </div>

</div>


  

  </div>

  <!-- DAILY LOG -->
  <section class="card">
    <h3>Recent Upsssssssload</h3>
    <ul id="foodEntries"></ul>
    <button id="newEntryBtn" class="primary-btn">Add Meal</button>
  </section>

</main>


  <div id="sheetOverlay" class="sheet-overlay"></div>

  <div id="mealSheet" class="bottom-sheet">
    <div class="sheet-handle"></div>

    <div class="sheet-content">
      <h3>Add Meal</h3>

      <input id="mealName" placeholder="Food name" />

      <div class="macro-input-grid">
        <input id="mealCalories" type="number" placeholder="Calories" />
        <input id="mealProtein" type="number" placeholder="Protein (g)" />
        <input id="mealCarbs" type="number" placeholder="Carbs (g)" />
        <input id="mealFat" type="number" placeholder="Fat (g)" />
      </div>

      <div class="sheet-actions">
        <button id="cancelMeal" class="secondary-btn">Cancel</button>
        <button id="saveMealBtn" class="primary-btn">Save</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>

</body>
</html>
