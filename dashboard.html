<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header class="navbar">
    <h1>My Diet Tracker - Dashboard</h1>
    <a href="settings.html" class="primary-btn">Settings</a>
  </header>

  <main class="container">

    <!-- Top Summary: Calories Ring -->
   <div id="top-summary" class="card">
  <canvas id="caloriesRing"></canvas>

  <div class="calories-text">
    <span id="caloriesLabel">Loading...</span>
  </div>

     <div id="timerText" class="timer-text"></div>

</div>


    <!-- Mini Macro Pie Charts -->
    <div id="macro-charts" class="macro-grid">
  <div class="macro-card">
    <p id="proteinLabel">Protein: 0 / 172 g</p>
    <canvas id="proteinPie"></canvas>
  </div>

  <div class="macro-card">
    <p id="fatLabel">Fat: 0 / 64 g</p>
    <canvas id="fatPie"></canvas>
  </div>

  <div class="macro-card">
    <p id="carbsLabel">Carbs: 0 / 257 g</p>
    <canvas id="carbsPie"></canvas>
  </div>
</div>


    <!-- Daily Food Log -->
    <div id="daily-log" class="card">
      <h3>Daily Food Log</h3>
      <ul id="foodEntries"></ul>
      <button id="newEntryBtn" class="primary-btn">New Entry</button>
    </div>

  </main>

  </main>

  <!-- ADD MEAL MODAL -->
  <div id="mealModal" class="modal hidden">
    <div class="modal-content">
      <h3>Add Meal</h3>

      <input id="mealName" placeholder="Food name" />

<div class="macro-input-grid">
  <input id="mealCalories" type="number" placeholder="Calories" />
  <input id="mealProtein" type="number" placeholder="Protein (g)" />
  <input id="mealCarbs" type="number" placeholder="Carbs (g)" />
  <input id="mealFat" type="number" placeholder="Fat (g)" />
</div>


      <div class="modal-actions">
        <button id="cancelMeal">Cancel</button>
        <button id="saveMealBtn" class="primary-btn">Save</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>



  
  <script src="app.js"></script>
</body>
</html>
