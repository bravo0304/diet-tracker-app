<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Diet Tracker - Dashboard</title>

  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <!-- NAVBAR -->
 <header class="context-bar">
  <div class="context-left">
    <div class="app-title">My Diet Tracker</div>
  </div>

  <div class="context-right">
    <a href="settings.html" class="settings-link">Settings</a>
  </div>
</header>


  <main class="container">

<!-- DATE ROW -->
<div class="date-row">
  <button class="date-arrow" id="prevDay">←</button>

  <div class="date-center">
    <div id="currentDateLabel">Today</div>
    <div id="timerText" class="reset-timer">Reset in --:--:--</div>
  </div>

  <button class="date-arrow" id="nextDay">→</button>
</div>


    
    <!-- DAILY OVERVIEW -->
    <section class="card daily-overview">

      <div class="ring-wrapper">
        <div id="caloriesRing" class="ring"></div>
        <div class="calories-text">
          <span id="caloriesLabel">0 / 0 kcal</span>
        </div>
      </div>

      <div class="macro-bars">

        <!-- Protein -->
        <div class="macro-bar">
          <div class="macro-header">
            <span>Protein</span>
            <span id="proteinLabel">0 / 0 g</span>
          </div>
          <div class="bar-bg">
            <div class="bar-fill protein-fill" id="proteinBar"></div>
          </div>
        </div>

        <!-- Fat -->
        <div class="macro-bar">
          <div class="macro-header">
            <span>Fat</span>
            <span id="fatLabel">0 / 0 g</span>
          </div>
          <div class="bar-bg">
            <div class="bar-fill fat-fill" id="fatBar"></div>
          </div>
        </div>

        <!-- Carbs -->
        <div class="macro-bar">
          <div class="macro-header">
            <span>Carbs</span>
            <span id="carbsLabel">0 / 0 g</span>
          </div>
          <div class="bar-bg">
            <div class="bar-fill carbs-fill" id="carbsBar"></div>
          </div>
        </div>

      </div>

    </section>

    <!-- DAILY LOG -->
    <section class="card" id="daily-log">
      <h3>Daily Food Log</h3>
      <ul id="foodEntries"></ul>
      <button id="newEntryBtn" class="primary-btn">New Entry</button>
    </section>

  </main>

  <!-- ADD MEAL MODAL -->
  <div id="mealSheet" class="bottom-sheet">
    <div class="modal-content">
      <h3>Add Meal</h3>

      <input id="mealName" placeholder="Food name" />

      <div class="macro-input-grid">
        <input id="mealCalories" type="number" placeholder="Calories" />
        <input id="mealProtein" type="number" placeholder="Protein (g)" />
        <input id="mealCarbs" type="number" placeholder="Carbs (g)" />
        <input id="mealFat" type="number" placeholder="Fat (g)" />
      </div>

      <div class="modal-actions">
        <button id="cancelMeal">Cancel</button>
        <button id="saveMealBtn" class="primary-btn">Save</button>
      </div>
    </div>
  </div>

<script type="module" src="app.js"></script>


</body>
</html>
