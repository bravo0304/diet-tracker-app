<!DOCTYPE html>
<html>
<head>
  <title>Setup Your Plan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/styles.css">


</head>

<body>

<body>

<div class="card">

  <div id="progress">
    <div id="progress-bar"></div>
  </div>

  <!-- STEP 1 -->
  <div class="step" id="step-1">
    <h2>What's your name?</h2>
    <input id="first_name" placeholder="First name">
    <input id="last_name" placeholder="Last name">
    <button onclick="nextStep(2)">Next</button>
  </div>

<!-- STEP 2 -->
<div class="step" id="step-2" style="display:none">
  <h2>Your goal</h2>

  <select id="goal" onchange="toggleWeightLossOptions()">
    <option value="weight_loss">Lose weight</option>
    <option value="fitness">Build muscle</option>
    <option value="health">General health</option>
  </select>

  <!-- Weight loss speed (hidden by default) -->
  <div id="weightloss_box" style="display:none; margin-top:20px;">
    <p>How fast do you want to lose weight?</p>

    <select id="weight_loss_speed">
      <option value="slow">Slow & sustainable</option>
      <option value="moderate" selected>Balanced</option>
      <option value="aggressive">Fast cut</option>
    </select>

    <small>Faster = harder to stick to</small>
  </div>

  <button onclick="nextStep(3)">Next</button>
</div>


  <!-- STEP 3 -->
  <div class="step" id="step-3" style="display:none">
    <h2>Your body</h2>

    <select id="sex">
      <option value="male">Male</option>
      <option value="female">Female</option>
    </select>

    <input id="age" type="number" placeholder="Age">
    <input id="feet" placeholder="Height (ft)">
    <input id="inches" placeholder="Height (in)">
    <input id="weight_lb" placeholder="Weight (lb)">

    <button onclick="finishOnboarding()">Finish</button>
  </div>

</div>

<script src="/onboarding.js"></script>

</body>


</body>
</html>
