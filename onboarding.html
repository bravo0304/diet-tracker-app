<!DOCTYPE html>
<html>
<head>
  <title>Setup Your Plan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      font-family: Arial;
      background:#0f172a;
      color:white;
      margin:0;
      padding:20px;
    }

    .card{
      background:#1e293b;
      padding:20px;
      border-radius:16px;
      max-width:420px;
      margin:40px auto;
    }

    h2 {text-align:center;}

    input, select {
      width:100%;
      padding:14px;
      margin-top:10px;
      margin-bottom:15px;
      border-radius:10px;
      border:none;
      font-size:16px;
    }

    button{
      width:100%;
      padding:15px;
      background:#22c55e;
      border:none;
      border-radius:12px;
      font-size:16px;
      color:white;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="card">
  <h2>Let's personalize your plan</h2>

  <input id="name" placeholder="Your name">

  <select id="goal">
    <option value="weight_loss">Weight Loss</option>
    <option value="fitness">Gym / Macro Tracking</option>
    <option value="health">General Health</option>
  </select>

  <select id="sex">
    <option value="male">Male</option>
    <option value="female">Female</option>
  </select>

  <input id="age" type="number" placeholder="Age">
  <input id="height" type="number" placeholder="Height (cm)">
  <input id="weight" type="number" placeholder="Weight (kg)">

  <button onclick="saveProfile()">Finish Setup</button>
  <p id="status"></p>
</div>

<script src="/onboarding.js"></script>

</body>
</html>
