<!DOCTYPE html>
<html>
<head>
  <title>Diet Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/styles.css">

  <style>
    body {
      font-family: Arial;
      background:#0f172a;
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      height:100vh;
      margin:0;
    }
    .card {
      background:#1e293b;
      padding:25px;
      border-radius:16px;
      width:320px;
      text-align:center;
      box-shadow:0 10px 25px rgba(0,0,0,.4);
    }
    button {
      width:100%;
      padding:15px;
      margin-top:10px;
      border:none;
      border-radius:12px;
      background:#22c55e;
      color:white;
      font-size:16px;
      cursor:pointer;
    }
    input {
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:10px;
      border:none;
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>Diet Tracker</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="status"></p>
  </div>

<script src="app.js"></script>
</body>
</html>
