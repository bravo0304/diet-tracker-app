<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calories Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body class="auth-page">

  <main class="auth-container">
    <div class="auth-card">

       <img src="/assets/logo.png" class="auth-logo" alt="Kalori Logo">

    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-sub">Log in to continue your goals</p>


      <form onsubmit="event.preventDefault(); login();">
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>

        <button class="primary-btn" type="submit">Login</button>
      </form>

     <a href="/signup.html" class="auth-link">
  Create Account
</a>


      <div id="status" class="auth-status"></div>

    </div>
  </main>

<script type="module" src="./js/login.js"></script>
</body>
</html>
