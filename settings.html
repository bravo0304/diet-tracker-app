<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    label { display: block; margin-top: 15px; }
    button { margin-top: 20px; padding: 8px 15px; }
  </style>
</head>
<body>

<h2>Settings</h2>

<form id="settingsForm">

  <!-- Units -->
  <label>Units:</label>
  <select id="unitSelect">
    <option value="metric">kg / cm</option>
    <option value="imperial">lb / ft</option>
  </select>

  <!-- Goal Toggles -->
  <label>Weight Loss Calorie Deficit:</label>
  <input type="checkbox" id="deficitToggle" checked>

  <label>Muscle Gain Calorie Surplus:</label>
  <input type="checkbox" id="surplusToggle" checked>

  <!-- Expert Macro Override -->
  <label>Enable Expert Macro Override:</label>
  <input type="checkbox" id="expertToggle">

  <!-- Apply / Save -->
  <button type="submit">Apply</button>

</form>

<!-- Link to the JS that handles saving/loading settings -->
<script src="settings.js"></script>

</body>
</html>
