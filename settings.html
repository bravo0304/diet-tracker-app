<h2>Settings</h2>

<form id="settingsForm">

  <!-- Units -->
  <label>Units:</label>
  <select id="unitSelect">
    <option value="metric">kg / cm</option>
    <option value="imperial">lb / ft</option>
  </select>

  <!-- Goal Toggles -->
  <label>Weight Loss Calorie Deficit:</label>
  <input type="checkbox" id="deficitToggle" checked>

  <label>Muscle Gain Calorie Surplus:</label>
  <input type="checkbox" id="surplusToggle" checked>

  <!-- Expert Macro Override -->
  <label>Enable Expert Macro Override:</label>
  <input type="checkbox" id="expertToggle">

  <!-- Apply / Save -->
  <button type="submit">Apply</button>

</form>
